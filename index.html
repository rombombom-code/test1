<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс Валют в Україні</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #4a4a4a;
            margin-bottom: 30px;
            font-weight: 700;
        }
        .rates-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .rate-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 200px;
            transition: transform 0.3s ease;
        }
        .rate-card:hover {
            transform: translateY(-5px);
        }
        .currency {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        .rate {
            font-size: 18px;
            margin: 5px 0;
        }
        .buy {
            color: #28a745;
        }
        .sell {
            color: #dc3545;
        }
        .last-update {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .loading {
            font-size: 18px;
            color: #666;
        }
        @media (max-width: 600px) {
            .rate-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Курс Валют в Україні</h1>
        <div id="rates" class="rates-container">
            <div class="loading">Завантаження...</div>
        </div>
        <div class="last-update" id="last-update"></div>
    </div>

    <script>
        const apiUrl = 'https://api.privatbank.ua/p24api/pubinfo?exchange&json&coursid=11'; // Курс готівки

        async function fetchRates() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                displayRates(data);
            } catch (error) {
                console.error('Помилка завантаження:', error);
                document.getElementById('rates').innerHTML = '<div class="loading">Помилка завантаження даних</div>';
            }
        }

        function displayRates(data) {
            const ratesContainer = document.getElementById('rates');
            ratesContainer.innerHTML = '';

            data.forEach(currency => {
                if (currency.ccy !== 'BTC') { // Виключаємо біткоїн, якщо не потрібно
                    const card = document.createElement('div');
                    card.className = 'rate-card';
                    card.innerHTML = `
                        <div class="currency">${currency.ccy}</div>
                        <div class="rate buy">Купівля: ${parseFloat(currency.buy).toFixed(2)} UAH</div>
                        <div class="rate sell">Продаж: ${parseFloat(currency.sale).toFixed(2)} UAH</div>
                    `;
                    ratesContainer.appendChild(card);
                }
            });

            document.getElementById('last-update').textContent = `Останнє оновлення: ${new Date().toLocaleString('uk-UA')}`;
        }

        // Завантажуємо дані при завантаженні сторінки
        fetchRates();

        // Оновлюємо кожні 5 хвилин
        setInterval(fetchRates, 5 * 60 * 1000);
    </script>
</body>
</html>
